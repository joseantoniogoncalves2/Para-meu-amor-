<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nossa História 💌</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family: "Georgia", serif;
    transition: background 1s;
}

/* estilo vintage */
.card{
    width:90%;
    max-width:600px;
    padding:20px;
    border-radius:15px;
    background: rgba(255, 248, 220, 0.95);
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    text-align:center;
}

h2{
    margin-bottom:5px;
}

p{
    margin-top:0;
    font-style:italic;
}

/* layout das fotos */
.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
    margin-top:15px;
}

.photo{
    background:white;
    padding:8px;
    border-radius:10px;
    box-shadow:0 5px 10px rgba(0,0,0,0.2);
}

.photo img{
    width:100%;
    height:140px;
    object-fit:cover;
    border-radius:8px;
}

.caption{
    font-size:13px;
    margin-top:5px;
    color:#444;
    font-style:italic;
}

button{
    margin-top:15px;
    padding:10px 20px;
    border:none;
    border-radius:20px;
    background:#8b5e3c;
    color:white;
    cursor:pointer;
}

button:hover{
    transform:scale(1.05);
}
</style>
</head>

<body>

<div class="card">

    <h2 id="title">Título</h2>
    <p id="text">Mensagem</p>

    <div class="grid" id="grid"></div>

    <button onclick="next()">Próxima página ➜</button>

</div>

<script>

const pages = [
{
    theme:"#f5ecd7",
    title:"O começo 💌",
    text:"Quando tudo começou...",
    photos:[
        {img:"img1.jpg", cap:"Nosso primeiro momento"},
        {img:"img2.jpg", cap:"Primeira lembrança juntos"},
        {img:"img3.jpg", cap:"Você sorrindo pra mim"},
        {img:"img4.jpg", cap:"Um dia inesquecível"}
    ]
},
{
    theme:"#efe2c2",
    title:"Momentos felizes ☀️",
    text:"Cada dia com você é especial",
    photos:[
        {img:"img5.jpg", cap:"Passeio juntos"},
        {img:"img6.jpg", cap:"Risadas sem fim"},
        {img:"img7.jpg", cap:"Nosso lugar favorito"},
        {img:"img8.jpg", cap:"Memória bonita"}
    ]
},
{
    theme:"#e6d3b3",
    title:"Saudade ❤️",
    text:"Mesmo longe, você está comigo",
    photos:[
        {img:"img9.jpg", cap:"Pensando em você"},
        {img:"img10.jpg", cap:"Queria voltar nesse dia"},
        {img:"img11.jpg", cap:"Falta você aqui"},
        {img:"img12.jpg", cap:"Meu coração é seu"}
    ]
},
{
    theme:"#dcc6a0",
    title:"Eu te amo 💍",
    text:"E vou te amar sempre",
    photos:[
        {img:"img13.jpg", cap:"Você e eu"},
        {img:"img14.jpg", cap:"Nosso futuro"},
        {img:"img15.jpg", cap:"Para sempre"},
        {img:"img16.jpg", cap:"❤️"}
    ]
}
];

let index = 0;

function loadPage(){

    const page = pages[index];

    document.body.style.background = page.theme;

    document.getElementById("title").innerText = page.title;
    document.getElementById("text").innerText = page.text;

    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    page.photos.forEach(p => {
        const div = document.createElement("div");
        div.className = "photo";

        div.innerHTML = `
            <img src="${p.img}">
            <div class="caption">${p.cap}</div>
        `;

        grid.appendChild(div);
    });
}

function next(){
    index++;
    if(index >= pages.length) index = 0;
    loadPage();
}

loadPage();

</script>

</body>
+</html>
