<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Nosso Amor 💖</title>

<style>
body {
    margin: 0;
    padding: 0;
    background: linear-gradient(135deg, #ffe6f0, #fff0f5, #ffe6f9);
    font-family: Arial, sans-serif;
    overflow-x: hidden;
}

/* brilho romântico no fundo */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: url('https://i.imgur.com/3QeZp2y.png');
    opacity: 0.08;
    pointer-events: none;
}

/* título */
h1 {
    text-align: center;
    color: #d63384;
    margin-top: 20px;
    font-size: 40px;
    text-shadow: 2px 2px 10px rgba(255, 0, 100, 0.3);
}

/* estilo das fotos */
.foto {
    position: absolute;
    width: 140px;
    height: 140px;
    border-radius: 20px;
    object-fit: cover;
    border: 4px solid white;
    box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    transition: 0.4s;
}

.foto:hover {
    transform: scale(1.1) rotate(2deg);
}

/* posições espalhadas (16 fotos) */
.f1  { top: 80px;  left: 5%; }
.f2  { top: 150px; left: 30%; }
.f3  { top: 60px;  left: 55%; }
.f4  { top: 180px; left: 80%; }

.f5  { top: 350px; left: 10%; }
.f6  { top: 420px; left: 35%; }
.f7  { top: 380px; left: 60%; }
.f8  { top: 450px; left: 85%; }

.f9  { top: 620px; left: 5%; }
.f10 { top: 680px; left: 30%; }
.f11 { top: 640px; left: 55%; }
.f12 { top: 700px; left: 80%; }

.f13 { top: 860px; left: 10%; }
.f14 { top: 900px; left: 40%; }
.f15 { top: 880px; left: 65%; }
.f16 { top: 940px; left: 85%; }

/* coração flutuando */
.heart {
    position: fixed;
    font-size: 20px;
    color: #ff4d88;
    animation: float 6s infinite ease-in-out;
}

@keyframes float {
    0% { transform: translateY(0); opacity: 0.6; }
    50% { transform: translateY(-30px); opacity: 1; }
    100% { transform: translateY(0); opacity: 0.6; }
}
</style>
</head>

<body>

<h1>💖 Nosso Amor 💖</h1>

<!-- 16 imagens -->
<img src="img1.jpg" class="foto f1">
<img src="img2.jpg" class="foto f2">
<img src="img3.jpg" class="foto f3">
<img src="img4.jpg" class="foto f4">

<img src="img5.jpg" class="foto f5">
<img src="img6.jpg" class="foto f6">
<img src="img7.jpg" class="foto f7">
<img src="img8.jpg" class="foto f8">

<img src="img9.jpg" class="foto f9">
<img src="img10.jpg" class="foto f10">
<img src="img11.jpg" class="foto f11">
<img src="img12.jpg" class="foto f12">

<img src="img13.jpg" class="foto f13">
<img src="img14.jpg" class="foto f14">
<img src="img15.jpg" class="foto f15">
<img src="img16.jpg" class="foto f16">

<!-- corações decorativos -->
<div class="heart" style="top:20%; left:10%;">💖</div>
<div class="heart" style="top:40%; left:80%;">💗</div>
<div class="heart" style="top:70%; left:50%;">💞</div>

</body>
</html>
